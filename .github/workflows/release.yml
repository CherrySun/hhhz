name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - arch: arm64
            target: arm64-apple-macosx13.0
          - arch: x86_64
            target: x86_64-apple-macosx13.0

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          swift build -c release --triple ${{ matrix.target }}

      - name: Prepare binary
        run: |
          cp .build/release/hhhz hhhz-${{ matrix.arch }}
          chmod +x hhhz-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hhhz-${{ matrix.arch }}
          path: hhhz-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hhhz-arm64

      - uses: actions/download-artifact@v4
        with:
          name: hhhz-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hhhz-arm64
            hhhz-x86_64
