name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'Sources/**'
      - 'Package.swift'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - arch: arm64
            target: arm64-apple-macosx13.0
          - arch: x86_64
            target: x86_64-apple-macosx13.0

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          swift build -c release --triple ${{ matrix.target }}

      - name: Prepare binary
        run: |
          cp .build/release/hhhz hhhz-${{ matrix.arch }}
          chmod +x hhhz-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hhhz-${{ matrix.arch }}
          path: hhhz-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          # Use date + short hash as version: v2026.0408.abc1234
          TAG="v$(date -u +%Y.%m%d).$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: hhhz-arm64

      - uses: actions/download-artifact@v4
        with:
          name: hhhz-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            hhhz-arm64
            hhhz-x86_64
